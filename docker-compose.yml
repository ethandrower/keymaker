services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keymaker
      POSTGRES_PASSWORD: keymaker
      POSTGRES_DB: keymaker
    volumes:
      - keymaker_pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keymaker"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: ./entrypoint.sh
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://keymaker:keymaker@db:5432/keymaker
    volumes:
      - .:/app
    ports:
      - "8010:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  keymaker_pgdata:
